name: PoC scripts

on:
  pull_request:
    paths:
      - ".github/workflows/poc-scripts.yml"
      - ".github/workflows/load-test-graphs.yml"
      - "docker/poc-runner/**"
      - "docker/load-runner/**"
      - "examples/docker-compose.poc.yml"
      - "examples/docker-compose.poc-runner.yml"
      - "examples/docker-compose.load.yml"
      - "examples/mediamtx.poc.yml"
      - "scripts/poc/**"
      - "scripts/load/**"
      - "docs/poc-verification.md"
      - "docs/poc-github-actions.md"
      - "docs/load-test.md"
      - "docs/container-load-test.md"
      - "README.md"
      - "package.json"
  push:
    branches:
      - "ci/poc-scripts-github-actions"
    paths:
      - ".github/workflows/poc-scripts.yml"
      - ".github/workflows/load-test-graphs.yml"
      - "docker/poc-runner/**"
      - "docker/load-runner/**"
      - "examples/docker-compose.poc.yml"
      - "examples/docker-compose.poc-runner.yml"
      - "examples/docker-compose.load.yml"
      - "examples/mediamtx.poc.yml"
      - "scripts/poc/**"
      - "scripts/load/**"
      - "docs/poc-verification.md"
      - "docs/poc-github-actions.md"
      - "docs/load-test.md"
      - "docs/container-load-test.md"
      - "README.md"
      - "package.json"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  poc-scripts:
    name: Run PoC scripts smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Docker versions
        run: |
          docker --version
          docker compose version

      - name: Validate docker compose configuration
        run: |
          docker compose -f examples/docker-compose.poc.yml config
          docker compose -f examples/docker-compose.poc-runner.yml config
          docker compose -f examples/docker-compose.load.yml config

      - name: Build PoC runner image
        run: docker compose -f examples/docker-compose.poc-runner.yml build poc-runner

      - name: Validate script syntax in PoC runner
        run: |
          docker compose -f examples/docker-compose.poc-runner.yml run --rm --entrypoint bash poc-runner -lc '
            bash -n scripts/poc/*.sh
            sh -n scripts/poc/hooks/*.sh
            bash -n scripts/load/*.sh
            node --check scripts/poc/check-webrtc-publish.mjs
          '

      - name: Build load runner image
        run: docker compose -f examples/docker-compose.load.yml build load-runner

      - name: Validate load graph script in load runner
        run: |
          docker compose -f examples/docker-compose.load.yml run --rm --entrypoint python3 load-runner -m py_compile scripts/load/render-load-graphs.py

      - name: Start MediaMTX
        run: docker compose -f examples/docker-compose.poc-runner.yml up -d mediamtx

      - name: Run smoke and WebRTC checks in PoC runner
        env:
          PUBLISH_DURATION: "12"
          RECORD_DURATION: "4"
          MAX_WAIT_SECONDS: "20"
          WEBRTC_CHECK_TIMEOUT_MS: "30000"
        run: |
          docker compose -f examples/docker-compose.poc-runner.yml run --rm \
            -e PUBLISH_DURATION \
            -e RECORD_DURATION \
            -e MAX_WAIT_SECONDS \
            -e WEBRTC_CHECK_TIMEOUT_MS \
            poc-runner

      - name: Show MediaMTX logs
        if: always()
        run: docker compose -f examples/docker-compose.poc-runner.yml logs mediamtx || true

      - name: Show PoC output files
        if: always()
        run: find tmp/poc-output -maxdepth 2 -type f -print || true

      - name: Stop MediaMTX
        if: always()
        run: docker compose -f examples/docker-compose.poc-runner.yml down -v || true
