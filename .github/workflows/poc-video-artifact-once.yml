name: PoC video artifact once

on:
  pull_request:
    paths:
      - ".github/workflows/poc-video-artifact-once.yml"
      - "scripts/poc/check-webrtc-publish.mjs"
  push:
    branches:
      - "ci/video-artifact-check"
    paths:
      - ".github/workflows/poc-video-artifact-once.yml"
      - "scripts/poc/check-webrtc-publish.mjs"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  video-artifact:
    name: Generate one-time PoC video artifact
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg jq curl

      - name: Install Playwright
        run: |
          npm install --no-audit --no-fund
          npx playwright install --with-deps chromium

      - name: Validate scripts
        run: |
          bash -n scripts/poc/*.sh
          sh -n scripts/poc/hooks/*.sh
          node --check scripts/poc/check-webrtc-publish.mjs
          docker compose -f examples/docker-compose.poc.yml config

      - name: Start MediaMTX
        run: docker compose -f examples/docker-compose.poc.yml up -d

      - name: Publish WebRTC canvas video and record one minute
        run: |
          set -euo pipefail
          mkdir -p tmp/poc-video-artifact
          WEBRTC_MEDIA_SOURCE=canvas WEBRTC_REQUIRE_RTP=1 WEBRTC_KEEP_ALIVE_MS=75000 npm run check:webrtc-publish > tmp/poc-video-artifact/webrtc-publisher.log 2>&1 &
          PUBLISH_PID=$!
          sleep 12
          ffmpeg \
            -hide_banner \
            -loglevel info \
            -rtsp_transport tcp \
            -i "rtsp://poc-viewer:poc-viewer-pass@127.0.0.1:8554/live/poc-webrtc-ci" \
            -t 60 \
            -map 0:v:0 \
            -c:v libx264 \
            -preset veryfast \
            -pix_fmt yuv420p \
            -an \
            -y \
            tmp/poc-video-artifact/live_poc-webrtc-ci_canvas.mp4 2>&1 | tee tmp/poc-video-artifact/record.log
          wait "${PUBLISH_PID}"
          test -s tmp/poc-video-artifact/live_poc-webrtc-ci_canvas.mp4

      - name: Show generated files
        if: always()
        run: find tmp/poc-video-artifact -maxdepth 2 -type f -print -exec ls -lh {} \; || true

      - name: Show MediaMTX logs
        if: always()
        run: docker compose -f examples/docker-compose.poc.yml logs mediamtx || true

      - name: Upload one-time video artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: poc-webrtc-canvas-recording
          path: |
            tmp/poc-video-artifact/*.mp4
            tmp/poc-video-artifact/*.log
          if-no-files-found: error
          retention-days: 1

      - name: Stop MediaMTX
        if: always()
        run: docker compose -f examples/docker-compose.poc.yml down -v || true
