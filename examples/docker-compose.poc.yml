services:
  mediamtx:
    image: bluenviron/mediamtx:1
    container_name: mediamtx-poc
    restart: unless-stopped
    environment:
      MTX_METRICS: "yes"
      MTX_METRICSADDRESS: ":9998"
    volumes:
      - ./mediamtx.poc.yml:/mediamtx.yml:ro
      - ../scripts/poc/hooks:/hooks:ro
    ports:
      - "8554:8554"
      - "1935:1935"
      - "8888:8888"
      - "8889:8889"
      - "8189:8189/udp"
      - "127.0.0.1:9997:9997"
      - "127.0.0.1:9998:9998"
    networks:
      - pocnet

networks:
  pocnet:
    ipam:
      config:
        - subnet: 172.28.0.0/16
