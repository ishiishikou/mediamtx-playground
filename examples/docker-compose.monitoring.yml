services:
  prometheus:
    image: prom/prometheus:latest
    container_name: mediamtx-poc-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=6h
      - --web.enable-lifecycle
    volumes:
      - ../monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - pocnet

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: mediamtx-poc-cadvisor
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    ports:
      - "127.0.0.1:8080:8080"
    networks:
      - pocnet

  load-runner:
    environment:
      PROMETHEUS_URL: http://prometheus:9090
      PROMETHEUS_QUERIES_FILE: /workspace/monitoring/prometheus/load-test-queries.json
      PROMETHEUS_LOOKBACK_SECONDS: "3600"
      PROMETHEUS_STEP: "5"

volumes:
  prometheus-data:
