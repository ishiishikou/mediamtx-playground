# MediaMTX PoC configuration.
# This file contains only local example credentials.

logLevel: info

api: yes
apiAddress: :9997

rtsp: yes
rtspAddress: :8554

rtmp: yes
rtmpAddress: :1935

hls: yes
hlsAddress: :8888
hlsAlwaysRemux: false
hlsVariant: lowLatency
hlsSegmentDuration: 1s
hlsPartDuration: 200ms

webrtc: yes
webrtcAddress: :8889
webrtcLocalUDPAddress: :8189

authMethod: internal
authInternalUsers:
  - user: poc-publisher
    pass: poc-publisher-pass
    ips: []
    permissions:
      - action: publish
        path: "~^live/.+$"

  - user: poc-viewer
    pass: poc-viewer-pass
    ips: []
    permissions:
      - action: read
        path: "~^live/.+$"
      - action: playback
        path: "~^live/.+$"

  - user: any
    pass:
    ips: ["127.0.0.1", "::1"]
    permissions:
      - action: api

pathDefaults:
  source: publisher

paths:
  "~^live/.+$":
    source: publisher
    runOnReady: "sh /hooks/log-ready.sh"
    runOnReadyRestart: no
    runOnNotReady: "sh /hooks/log-not-ready.sh"

  all_others:
